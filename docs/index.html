<!doctypehtml><html lang=en><head><meta charset=utf-8><meta content="width=device-width,initial-scale=1"name=viewport><title>Poker — Monte Carlo AI</title><style>*,::after,::before{box-sizing:border-box;margin:0;padding:0}body,html{width:100%;height:100%;background:#0d1117;overflow:hidden;display:flex;align-items:center;justify-content:center}canvas.emscripten{display:block;image-rendering:crisp-edges;image-rendering:pixelated}#loading{position:fixed;inset:0;background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;color:#e6c87a;font-family:'Segoe UI',system-ui,sans-serif;z-index:10;transition:opacity .4s}#loading h1{font-size:2rem;letter-spacing:.1em}#loading p{font-size:.9rem;color:#666}#bar-wrap{width:260px;height:6px;background:#1e2a1e;border-radius:3px;overflow:hidden}#bar{height:100%;width:0%;background:linear-gradient(90deg,#2e7d32,#66bb6a);border-radius:3px;transition:width .15s}</style></head><body><div id=loading><h1>♠ Poker</h1><div id=bar-wrap><div id=bar></div></div><p>Loading Monte Carlo engine…</p></div><canvas class=emscripten id=canvas oncontextmenu=event.preventDefault() tabindex=-1></canvas><script>var Module={canvas:document.getElementById("canvas"),setStatus:function(n){var t=n.match(/(\d+(\.\d+)?)\/(\d+)/);if(t&&(document.getElementById("bar").style.width=100*t[1]/t[3]+"%"),!n){var e=document.getElementById("loading");e.style.opacity="0",setTimeout((function(){e.style.display="none"}),400)}},print:function(n){console.log(n)},printErr:function(n){console.warn(n)}};window.addEventListener("resize",(function(){}))</script><script async src=index.js></script></body></html>
